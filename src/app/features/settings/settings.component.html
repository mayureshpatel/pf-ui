<div class="p-6 bg-surface-50 dark:bg-surface-950 min-h-screen flex flex-col gap-6">
  <!-- Page Header -->
  <app-screen-toolbar [showDivider]="false">
    <div toolbarTitle>
      <h1 class="text-4xl font-extrabold text-surface-900 dark:text-surface-0 tracking-tight">Settings</h1>
      <p class="text-muted-color mt-1 text-lg">Configure your personal finance environment</p>
    </div>
  </app-screen-toolbar>

  <div class="flex-1 overflow-hidden">
    <p-tabs value="1">
      <p-tablist class="bg-transparent border-none">
        <p-tab value="1">
          <div class="flex items-center gap-2">
            <i class="pi pi-tags"></i>
            <span class="font-bold">Category Rules</span>
          </div>
        </p-tab>
      </p-tablist>

      <p-tabpanels class="bg-transparent px-0 py-6">
        <p-tabpanel value="1">
          <app-category-rules/>
        </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </div>
</div>
