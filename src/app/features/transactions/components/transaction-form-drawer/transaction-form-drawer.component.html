<app-drawer
  [(visible)]="visible"
  [title]="drawerTitle()"
  [icon]="isEditMode() ? 'pi-receipt' : 'pi-plus'"
  [saving]="saving()"
  [saveLabel]="isEditMode() ? 'Update Record' : 'Post Transaction'"
  (saveEmitterRef)="onSubmit()"
  (showEmitterRef)="onShow()">

  @if (loading()) {
    <p-progress-spinner></p-progress-spinner>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-8 py-4">
    <!-- Transaction Type -->
    <div class="flex flex-col gap-3">
      <label for="type-options" class="text-sm font-bold uppercase tracking-wide text-surface-700">
        Transaction Classification
      </label>
      <div id="type-options" class="flex flex-row justify-center gap-3">
        @for (option of typeOptions; track option.value) {
          <button
            type="button"
            id="type-option-{{ option.value }}"
            (click)="form.patchValue({type: option.value})"
            class="flex flex-col items-center justify-center p-4 rounded-2xl border transition-all duration-300 group"
            [class.bg-primary]="form.value.type === option.value"
            [class.bg-primary-50]="form.value.type === option.value"
            [class.border-primary]="form.value.type === option.value"
            [class.shadow-md]="form.value.type === option.value"
            [class.ring-1]="form.value.type === option.value"
            [class.ring-primary-200]="form.value.type === option.value"
            [class.bg-surface-0]="form.value.type !== option.value"
            [class.border-surface-200]="form.value.type !== option.value"
            [class.opacity-60]="form.value.type !== option.value"
            [class.hover:opacity-100]="form.value.type !== option.value"
            [class.hover:shadow-xl]="form.value.type !== option.value"
            [class.hover:-translate-y-1]="form.value.type !== option.value"
          >
            <i
              [class]="'pi ' + option.icon + ' text-2xl mb-2 transition-transform group-hover:scale-110 ' + (form.value.type === option.value ? 'text-primary' : option.color)"></i>
            <span
              [class]="'text-[10px] font-black uppercase tracking-widest ' + (form.value.type === option.value ? 'text-primary' : 'text-surface-500')">
              {{ option.label }}
            </span>
          </button>
        }
      </div>
    </div>

    <!-- Amount -->
    <div class="flex flex-col gap-2">
      <label for="amount" class="text-sm font-bold uppercase tracking-wide text-surface-700">Amount</label>
      <p-inputNumber
        id="amount"
        formControlName="amount"
        mode="currency"
        currency="USD"
        placeholder="$0.00"
        [autofocus]="!isEditMode()"
        inputStyleClass="font-mono font-black"
      />
    </div>

    <!-- Date -->
    <div class="flex flex-col gap-2">
      <label for="date" class="text-sm font-bold uppercase tracking-wide text-surface-700">Date</label>
      <p-datePicker
        id="date"
        formControlName="transactionDate"
        dateFormat="yy-mm-dd"
      />
    </div>

    <!-- Merchant -->
    <div class="flex flex-col gap-2">
      <label for="merchant" class="text-sm font-bold uppercase tracking-wide text-surface-700">
        Merchant / Payee
      </label>
      <p-autoComplete
        id="merchant"
        formControlName="merchant"
        [suggestions]="filteredMerchants()"
        (completeMethod)="filterMerchants($event)"
        placeholder="Search for a merchant..."
        dataKey="id"
        optionLabel="originalName"
        panelStyleClass="max-w-2xs"
        inputStyleClass="w-full"
      >
        <ng-template #item let-merchant>
          <div class="flex items-center gap-2" [pTooltip]="tooltipContent" tooltipPosition="top">
            <span class="text-sm truncate">{{ merchant.originalName }}</span>
          </div>
          <ng-template #tooltipContent>
            <div class="flex flex-col gap-1">
              <span class="text-xs">ID: {{ merchant.id }}</span>
              <span class="text-sm">{{ merchant.originalName }}</span>
              <span class="text-xs text-surface-500">{{ merchant.cleanName }}</span>
            </div>
          </ng-template>
        </ng-template>
      </p-autoComplete>
    </div>

    <!-- Category -->
    <div class="flex flex-col gap-2">
      <label for="category" class="text-sm font-bold uppercase tracking-wide text-surface-700">
        Category
      </label>
      <p-select
        id="category"
        [options]="groupedCategories()"
        formControlName="category"
        [group]="true"
        optionLabel="label"
        optionValue="value"
        placeholder="Select a category..."
      >
        <ng-template #group let-group>
          <div class="flex items-center gap-2 uppercase tracking-wide">
            <i [class]="'pi ' + group.value.icon"></i>
            <span>{{ group.label }}</span>
          </div>
        </ng-template>

        <ng-template #item let-item>
          <div class="flex items-center gap-3">
            <div class="w-2.5 h-2.5 rounded-full shadow-xs"
                 [style.background-color]="item.value.color || '#ffffff'"
            >
            </div>
            <span class="font-medium truncate">{{ item.value.name }}</span>
          </div>
        </ng-template>
      </p-select>
    </div>

    <!-- Target Account -->
    <div class="flex flex-col gap-2">
      <label for="account" class="text-sm font-bold uppercase tracking-wide text-surface-700">
        Target Account
      </label>
      <p-select
        id="account"
        formControlName="accountId"
        [options]="accounts()"
        optionLabel="name"
        optionValue="id"
        placeholder="Select the associated account"
        class="w-full"
      />
    </div>

    <!-- Description -->
    <div class="flex flex-col gap-2">
      <label for="description" class="text-sm font-bold uppercase tracking-wide text-surface-700">
        Description / Notes
      </label>
      <textarea
        pInputText
        id="description"
        formControlName="description"
        rows="3"
        placeholder="Add any additional details or memos here..."
        class="w-full p-3 text-sm font-medium leading-relaxed border-surface-200"
      ></textarea>
    </div>
  </form>
</app-drawer>
