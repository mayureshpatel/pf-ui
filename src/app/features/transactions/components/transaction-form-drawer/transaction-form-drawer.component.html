<app-drawer
  [(visible)]="visible"
  [title]="drawerTitle()"
  [icon]="isEditMode() ? 'pi-receipt' : 'pi-plus'"
  [saving]="saving()"
  [saveLabel]="isEditMode() ? 'Update Record' : 'Post Transaction'"
  (saveEmitterRef)="onSubmit()"
  (cancelEmitterRef)="onHide()">

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-8 py-4">
    <!-- Transaction Type -->
    <div class="flex flex-col gap-3">
      <label class="text-[10px] font-black uppercase tracking-[0.2em] text-surface-400">Transaction
        Classification</label>
      <div class="grid grid-cols-3 gap-3">
        @for (option of typeOptions; track option.value) {
          <button
            type="button"
            (click)="form.patchValue({type: option.value})"
            [class]="'flex flex-col items-center justify-center p-4 rounded-2xl border transition-all duration-300 ' +
                     (form.value.type === option.value ?
                      'bg-primary/5 border-primary shadow-sm ring-1 ring-primary/20' :
                      'bg-surface-0 border-surface-200 dark:border-surface-800 opacity-60 hover:opacity-100')"
          >
            <i
              [class]="option.icon + ' text-2xl mb-2 ' + (form.value.type === option.value ? 'text-primary' : option.color)"></i>
            <span
              [class]="'text-[10px] font-black uppercase tracking-widest ' + (form.value.type === option.value ? 'text-primary' : 'text-surface-500')">
              {{ option.label }}
            </span>
          </button>
        }
      </div>
    </div>

    <!-- Amount and Date -->
    <div
      class="grid grid-cols-2 gap-6 p-6 rounded-2xl bg-surface-50 dark:bg-surface-900 border border-surface-200 dark:border-surface-800 ring-1 ring-surface-100 dark:ring-surface-800">
      <div class="flex flex-col gap-2">
        <label for="amount" class="text-[10px] font-black uppercase tracking-widest text-surface-400">Amount</label>
        <p-inputNumber
          id="amount"
          formControlName="amount"
          mode="currency"
          currency="USD"
          placeholder="$0.00"
          [autofocus]="!isEditMode()"
          inputStyleClass="text-2xl font-mono font-black bg-transparent border-none p-0 focus:ring-0"
        />
      </div>
      <div class="flex flex-col gap-2 border-l border-surface-200 dark:border-surface-700 pl-6">
        <label for="date" class="text-[10px] font-black uppercase tracking-widest text-surface-400">Date</label>
        <p-datePicker
          id="date"
          formControlName="date"
          dateFormat="yy-mm-dd"
          appendTo="body"
          styleClass="w-full"
          inputStyleClass="text-sm font-bold bg-transparent border-none p-0 focus:ring-0"
        />
      </div>
    </div>

    <!-- Merchant and Category -->
    <div class="flex flex-col gap-6">
      <!-- Merchant Autocomplete -->
      <div class="flex flex-col gap-2">
        <label for="merchant" class="text-sm font-bold uppercase tracking-wide text-surface-700 dark:text-surface-200">
          Merchant / Payee
        </label>
        <p-autoComplete
          id="merchant"
          formControlName="merchant"
          [suggestions]="filteredMerchants()"
          (completeMethod)="filterMerchants($event)"
          field="cleanName"
          [dropdown]="true"
          placeholder="Search for a merchant..."
          styleClass="w-full"
          inputStyleClass="w-full py-3"
          appendTo="body">
          <ng-template #item let-merchant>
            <div class="flex items-center gap-2">
              <i class="pi pi-shop text-surface-400"></i>
              <span class="font-medium">{{ merchant.cleanName }}</span>
            </div>
          </ng-template>
        </p-autoComplete>
      </div>

      <!-- Category Autocomplete -->
      <div class="flex flex-col gap-2">
        <label for="category" class="text-sm font-bold uppercase tracking-wide text-surface-700 dark:text-surface-200">
          Classification
        </label>
        <p-autoComplete
          id="category"
          formControlName="category"
          [suggestions]="filteredCategories()"
          (completeMethod)="filterCategories($event)"
          field="name"
          [dropdown]="true"
          placeholder="Select a category..."
          styleClass="w-full"
          inputStyleClass="w-full py-3"
          appendTo="body">
          <ng-template #item let-category>
            <div class="flex items-center gap-2">
              <div [class]="'w-2 h-2 rounded-full ' + (category.color || 'bg-surface-300')"></div>
              <span class="font-medium">{{ category.name }}</span>
            </div>
          </ng-template>
        </p-autoComplete>
      </div>
    </div>

    <!-- Target Account -->
    <div class="flex flex-col gap-2">
      <label for="account" class="text-sm font-bold uppercase tracking-wide text-surface-700 dark:text-surface-200">
        Source Account
      </label>
      <p-select
        id="account"
        formControlName="account"
        [options]="accounts()"
        optionLabel="name"
        optionValue="id"
        placeholder="Select the associated account"
        class="w-full"
        appendTo="body"
      />
    </div>

    <!-- Description -->
    <div class="flex flex-col gap-2">
      <label for="description" class="text-sm font-bold uppercase tracking-wide text-surface-700 dark:text-surface-200">
        Description / Notes
      </label>
      <textarea
        pInputText
        id="description"
        formControlName="description"
        rows="3"
        placeholder="Add any additional details or memos here..."
        class="w-full p-3 text-sm font-medium leading-relaxed bg-surface-50 dark:bg-surface-900 border-surface-200 dark:border-surface-800"
      ></textarea>
    </div>
  </form>
</app-drawer>
