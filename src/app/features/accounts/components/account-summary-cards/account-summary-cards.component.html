<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
  <!-- Total Assets -->
  <p-card class="card-soft-hover">
    <div class="flex items-center justify-between">
      <div class="flex flex-col gap-1">
        <span class="text-xs font-bold uppercase tracking-widest text-surface-500 dark:text-surface-400">Total Assets</span>
        <span class="text-3xl font-black text-emerald-600 dark:text-emerald-400 font-mono">
          {{ summary().totalAssets | formatCurrency }}
        </span>
      </div>
      <div class="bg-emerald-50 dark:bg-emerald-900/30 p-4 rounded-2xl ring-1 ring-emerald-200/50 dark:ring-emerald-700/50">
        <i class="pi pi-chart-line text-emerald-600 dark:text-emerald-400 text-2xl"></i>
      </div>
    </div>
  </p-card>

  <!-- Total Liabilities -->
  <p-card class="card-soft-hover">
    <div class="flex items-center justify-between">
      <div class="flex flex-col gap-1">
        <span class="text-xs font-bold uppercase tracking-widest text-surface-500 dark:text-surface-400">Total Liabilities</span>
        <span class="text-3xl font-black text-rose-600 dark:text-rose-400 font-mono">
          {{ summary().totalLiabilities | formatCurrency }}
        </span>
      </div>
      <div class="bg-rose-50 dark:bg-rose-900/30 p-4 rounded-2xl ring-1 ring-rose-200/50 dark:ring-rose-700/50">
        <i class="pi pi-credit-card text-rose-600 dark:text-rose-400 text-2xl"></i>
      </div>
    </div>
  </p-card>

  <!-- Net Worth -->
  <p-card class="card-soft-hover">
    <div class="flex items-center justify-between">
      <div class="flex flex-col gap-1">
        <span class="text-xs font-bold uppercase tracking-widest text-surface-500 dark:text-surface-400">Net Worth</span>
        <span class="text-3xl font-black font-mono tracking-tighter"
              [class.text-emerald-600]="summary().netWorth >= 0"
              [class.text-rose-600]="summary().netWorth < 0">
          {{ summary().netWorth | formatCurrency }}
        </span>
      </div>
      <div class="p-4 rounded-2xl ring-1 ring-surface-200 dark:ring-surface-700">
        <i class="pi pi-wallet text-surface-700 dark:text-surface-200 text-2xl"></i>
      </div>
    </div>
  </p-card>
</div>
