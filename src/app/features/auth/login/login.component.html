<div class="flex items-center justify-center min-h-screen bg-surface-ground">
  <p-card class="w-full max-w-md shadow-lg">
    <ng-template pTemplate="header">
      <div class="text-center pt-6">
        <i class="pi pi-wallet text-5xl text-primary"></i>
        <h1 class="text-2xl font-semibold mt-4 text-color">Personal Finance</h1>
        <p class="text-muted-color mt-2">Sign in to your account</p>
      </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
      @if (errorMessage()) {
        <p-message severity="error" [text]="errorMessage()!" styleClass="w-full" />
      }

      <div class="flex flex-col gap-2">
        <label for="username" class="font-medium text-color">Username</label>
        <input
          pInputText
          id="username"
          formControlName="username"
          placeholder="Enter your username"
          class="w-full"
          autocomplete="username"
        />
        @if (form.controls.username.invalid && form.controls.username.touched) {
          <small class="text-red-500">Username is required</small>
        }
      </div>

      <div class="flex flex-col gap-2">
        <label for="password" class="font-medium text-color">Password</label>
        <p-password
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
          autocomplete="current-password"
        />
        @if (form.controls.password.invalid && form.controls.password.touched) {
          <small class="text-red-500">Password is required</small>
        }
      </div>

      <div class="flex items-center gap-2">
        <p-checkbox
          formControlName="rememberMe"
          [binary]="true"
          inputId="rememberMe"
        />
        <label for="rememberMe" class="text-color cursor-pointer">Remember me</label>
      </div>

      <p-button
        type="submit"
        label="Sign In"
        [loading]="isSubmitting()"
        [disabled]="isSubmitting()"
        styleClass="w-full"
        severity="primary"
      />

      <div class="text-center text-muted-color">
        Don't have an account?
        <a routerLink="/register" class="text-primary cursor-pointer hover:underline ml-1">
          Create account
        </a>
      </div>
    </form>
  </p-card>
</div>
