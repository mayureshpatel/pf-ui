<div
  class="flex flex-wrap items-center gap-4 card-soft">
  <!-- Preset Buttons -->
  <div class="flex items-center gap-1.5 px-1.5">
    @for (preset of presets; track preset.label) {
      <p-button
        [label]="preset.label"
        [text]="dateRange().label !== preset.label"
        [severity]="dateRange().label === preset.label ? 'primary' : 'secondary'"
        size="small"
        (onClick)="onPresetClick(preset)"
        class="transition-all duration-200"
      />
    }
  </div>

  <div class="w-px h-6 bg-surface-200 hidden md:block"></div>

  <!-- Custom Date Range Picker -->
  <div class="flex items-center gap-3 pr-3">
    <div class="flex flex-col">
      <span class="text-[9px] font-black uppercase tracking-widest text-surface-400">Custom Period</span>
      <p-datePicker
        [(ngModel)]="selectedRange"
        selectionMode="range"
        (onSelect)="onDateSelect()"
        [showButtonBar]="true"
        [showIcon]="true"
        iconDisplay="input"
        dateFormat="yy-mm-dd"
        placeholder="Select dates..."
        styleClass="border-none bg-transparent"
        inputStyleClass="p-0 text-sm font-bold text-surface-700 dark:text-surface-200 bg-transparent border-none focus:ring-0 w-48"
      />
    </div>
  </div>
</div>
