<p-card class="h-full shadow-sm border-none ring-1 ring-surface-200 dark:ring-surface-800">
  <ng-template pTemplate="title">
    <div class="flex items-center gap-2 mb-2">
      <i class="pi pi-chart-bar text-primary"></i>
      <span class="text-xl font-extrabold text-surface-900 dark:text-surface-0 tracking-tight">Cash Flow Trend</span>
    </div>
  </ng-template>

  <div class="h-80 w-full mt-4">
    <p-chart type="bar" [data]="chartData()" [options]="chartOptions" class="h-full w-full"/>
  </div>
</p-card>
