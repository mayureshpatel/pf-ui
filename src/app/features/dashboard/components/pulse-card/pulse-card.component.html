<p-card
  class="h-full shadow-sm border-none ring-1 ring-surface-200 dark:ring-surface-800 transition-all duration-300 hover:shadow-md">
  <div class="flex flex-col gap-3">
    <!-- Card Header -->
    <span class="text-xs font-bold text-surface-500 uppercase tracking-widest">{{ title() }}</span>

    <!-- Value & Trend -->
    <div class="flex items-baseline justify-between">
      <span class="text-3xl font-black tracking-tight font-mono"
            [class]="color() || 'text-surface-900 dark:text-surface-0'">
        {{ formattedValue() }}
      </span>

      <div
        [class]="trendStyles() + ' flex items-center gap-1 text-[10px] font-black uppercase px-2.5 py-1 rounded-full ring-1 shadow-xs transition-colors duration-500'">
        <i [class]="trendIcon() + ' text-[8px]'"></i>
        <span>{{ Math.abs(trend()).toFixed(0) }}%</span>
      </div>
    </div>

    <!-- Comparison Subtext -->
    <div class="flex items-center gap-1.5 mt-1">
      <div class="w-1.5 h-1.5 rounded-full bg-surface-200"></div>
      <span class="text-[11px] font-bold text-muted-color">
        vs {{ type() === 'percent' ? previousValue().toFixed(1) + '%' : previousValue() | formatCurrency }} last period
      </span>
    </div>
  </div>
</p-card>
